<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hamdast Session Token</title>
  </head>
  <body>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search || "");
        var appId = (params.get("app_id") || "").trim();
        var hashId = (params.get("hash_id") || "").trim();
        var scopeParam = (params.get("scope") || "").trim();
        var eventName = "HAMDAST_SDK_SESSION_TOKEN_RESPONSE";
        var responseEventName = params.get("response_event") || eventName;
        var targetOrigin = (params.get("origin") || "").trim() || "*";
        var targetWindow = window.opener || window.parent;

        function sendToParent(payload) {
          if (!targetWindow || !targetWindow.postMessage) {
            return;
          }
          targetWindow.postMessage(
            {
              hamdast: {
                event: responseEventName,
                hash_id: hashId,
                data: payload,
              },
            },
            targetOrigin
          );
        }

        function sendAndClose(payload) {
          sendToParent(payload);
          setTimeout(function () {
            if (window.opener && !window.opener.closed) {
              window.close();
            }
          }, 100);
        }

        if (!appId || !hashId) {
          sendAndClose({
            ok: false,
            error: "app_id and hash_id are required.",
            error_code: "INVALID_INPUT",
          });
          return;
        }

        var body = {};
        if (scopeParam) {
          body.scope = scopeParam
            .split(",")
            .map(function (item) {
              return item.trim();
            })
            .filter(Boolean);
        }

        fetch("/api/v1/apps/" + encodeURIComponent(appId) + "/oauth/session_token", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          credentials: "include",
          body: JSON.stringify(body),
        })
          .then(function (res) {
            return res.json().then(function (data) {
              return { status: res.status, data: data };
            });
          })
          .then(function (result) {
            if (result.status >= 400 || !result.data?.session_token) {
              sendAndClose({
                ok: false,
                error:
                  result.data?.error?.message ||
                  result.data?.message ||
                  "Failed to create session token.",
                error_code: result.data?.error?.code || "SESSION_TOKEN_FAILED",
                request_id: result.data?.error?.request_id || result.data?.request_id,
                details: result.data?.error?.details || null,
              });
              return;
            }
            sendAndClose({
              ok: true,
              session_token: result.data.session_token,
              expires_at: result.data.expires_at,
              request_id: result.data.request_id || null,
            });
          })
          .catch(function () {
            sendAndClose({
              ok: false,
              error: "Request failed while creating session token.",
              error_code: "NETWORK_ERROR",
            });
          });
      })();
    </script>
  </body>
</html>
